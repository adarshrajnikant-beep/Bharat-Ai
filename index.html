<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>BharatAI</title>\n    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">\n</head>\n<body class="bg-white text-gray-800">\n    <div class="container mx-auto">\n        <header class="text-center py-5">\n            <h1 class="text-4xl font-bold text-indigo-600">Welcome to BharatAI</h1>\n        </header>\n        <main>\n            <div class="flex flex-col items-center justify-center h-screen">\n                <div class="w-full max-w-md">\n                    <div class="bg-saffron-600 rounded-lg shadow-lg p-6">\n                        <h2 class="text-2xl mb-4">Chat with Us</h2>\n                        <div class="mb-4">\n                            <input type="text" class="border border-gray-300 rounded-md p-2 w-full" placeholder="Type your message...">\n                        </div>\n                        <button class="bg-indigo-600 text-white rounded-md p-2 w-full">Send</button>\n                    </div>\n                </div>\n            </div>\n        </main>\n    </div>\n    <nav class="fixed bottom-0 w-full bg-saffron-600">\n        <div class="flex justify-around p-4">\n            <button class="text-white">Home</button>\n            <button class="text-white" onclick="openPrivacyPolicy()">Privacy Policy</button>\n        </div>\n    </nav>\n    <div id="privacyModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center">\n        <div class="bg-white rounded-lg p-5 w-4/5 md:w-1/3">\n            <h2 class="text-xl font-bold">Privacy Policy</h2>\n            <p class="mt-2">Your privacy is important to us. We will not share your personal information.</p>\n            <button class="mt-4 bg-indigo-600 text-white rounded-md p-2" onclick="closePrivacyPolicy()">Close</button>\n        </div>\n    </div>\n    <script>\n        function openPrivacyPolicy() {\n            document.getElementById('privacyModal').classList.remove('hidden');\n        }\n        function closePrivacyPolicy() {\n            document.getElementById('privacyModal').classList.add('hidden');\n        }\n    </script>\n</body>\n</html>
