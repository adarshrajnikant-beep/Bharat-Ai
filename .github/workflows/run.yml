name: AI-CEO-24/7
on:
  schedule:
    - cron: "0 */6 * * *" # Har 6 ghante mein refresh taaki session active rahe
  push:
    branches: [ main ]
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install -g netlify-cli
      - name: Start Empire
        env:
          OPENROUTER: ${{ secrets.OPENROUTER }}
          IG_USER: ${{ secrets.IG_USER }}
          IG_PASS: ${{ secrets.IG_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CASHFREE_ID: ${{ secrets.CASHFREE_ID }}
          CASHFREE_SECRET: ${{ secrets.CASHFREE_SECRET }}
          NETLIFY: ${{ secrets.NETLIFY }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
        run: python main.py
        
